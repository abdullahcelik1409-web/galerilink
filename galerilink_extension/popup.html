<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap');

    :root {
      --primary: #10b981; /* Emerald-500 */
      --primary-hover: #059669;
      --bg: #0f172a; /* Slate-900 */
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      width: 320px;
      padding: 0;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-hidden: true;
    }

    .container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent);
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #10b981, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(16, 185, 129, 0.1);
      color: var(--primary);
      margin-bottom: 8px;
    }

    h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: var(--text);
    }

    p {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
      margin: 0;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #475569;
    }

    .settings-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      width: 100%;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    #settings-view {
      display: none;
    }

    .input-group {
      margin-top: 12px;
    }

    label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px;
      color: white;
      font-family: inherit;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
    }

    #status-msg {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      border-radius: 8px;
      padding: 8px;
      display: none;
    }

    .success {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-box" style="width: 24px; height: 24px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px;">G</div>
      <span class="logo-text">Galerilink</span>
    </header>

    <div id="main-view" class="card">
      <div class="status-badge">Aktif</div>
      <h3>Taslağa Aktar</h3>
      <p id="info-text">Sahibinden ilan detaylarını anında veritabanınıza kaydedin.</p>
      
      <div style="margin-top: 20px;">
        <button id="import-btn" class="btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Hemen Aktar
        </button>
        <button id="show-settings" class="settings-btn">Ayarlar & Key Değiştir</button>
      </div>
    </div>

    <div id="settings-view" class="card">
      <h3>Ayarlar</h3>
      <p>API Keyinizi girerek galerinize bağlanın.</p>
      
      <div class="input-group">
        <label>Extension Key</label>
        <input type="password" id="api-key" placeholder="UUID Formatında Key">
      </div>

      <div style="margin-top: 20px; display: flex; gap: 8px;">
        <button id="save-settings" class="btn" style="flex: 1;">Kaydet</button>
        <button id="hide-settings" class="settings-btn" style="margin: 0; width: auto; padding: 0 15px;">Geri</button>
      </div>
    </div>

    <div id="status-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
